name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME#v}" = "$(tr -d '[:space:]' < VERSION)"

      - name: Run smoke tests
        run: swift run LittleSwanSmokeTests

      - name: Build ad-hoc signed universal archive
        run: |
          make archive \
            ARCHS="arm64 x86_64" \
            BUILD_NUMBER="${{ github.run_number }}"

      - name: Render Homebrew Cask
        run: Scripts/render-homebrew-cask.sh "$(cat VERSION)" "dist/Little-Swan-$(cat VERSION).zip"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --generate-notes \
            --notes "This build is ad-hoc signed and is not notarized by Apple. On first launch, macOS may require approval in System Settings > Privacy & Security > Open Anyway." \
            --verify-tag
