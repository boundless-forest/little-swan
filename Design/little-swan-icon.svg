<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Little Swan app icon</title>
  <desc id="desc">A minimalist blue app icon with an elegant handwritten LS monogram.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.58" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#0757D8"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF8FF"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#063F9E" flood-opacity="0.22"/>
    </filter>
    <filter id="inner-glow" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#FFFFFF" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#blue)"/>

  <!-- Elegant handwritten monogram. Snell Roundhand is bundled with macOS;
       fallbacks keep the logo script-like if opened elsewhere. -->
  <g filter="url(#soft-shadow)">
    <text x="512" y="642"
          text-anchor="middle"
          dominant-baseline="middle"
          fill="url(#ink)"
          filter="url(#inner-glow)"
          font-family="Snell Roundhand, SnellRoundhand, Apple Chancery, Brush Script MT, cursive"
          font-size="432"
          font-weight="700"
          letter-spacing="-32">LS</text>
  </g>
</svg>
