<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Little Swan app icon</title>
  <desc id="desc">A refined purple origami swan on a pale lavender macOS icon tile.</desc>
  <defs>
    <linearGradient id="tile" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F7F3FE"/>
      <stop offset="1" stop-color="#EDE6FA"/>
    </linearGradient>
  </defs>

  <!-- Layered offsets provide a subtle AppKit-compatible shadow without SVG filters. -->
  <rect x="59" y="64" width="398" height="398" rx="89" fill="#342E3D" opacity="0.07"/>
  <rect x="57" y="59" width="400" height="400" rx="89" fill="#6F4BC7" opacity="0.05"/>
  <rect x="54" y="54" width="404" height="404" rx="90" fill="url(#tile)" stroke="#DED5EF" stroke-width="2"/>
  <path d="M91 150 C127 86 204 66 277 72" fill="none" stroke="#FFFFFF" stroke-opacity="0.72" stroke-width="4" stroke-linecap="round"/>

  <g transform="translate(33 38) scale(0.87109375)" stroke-linejoin="round">
    <!-- Both wings meet at one shoulder for a single, readable flight gesture. -->
    <path d="M258 298 L211 118 L294 200 L333 284 Z" fill="#B39AFB"/>
    <path d="M258 298 L97 169 L146 254 L225 303 Z" fill="#9C7BF6"/>
    <path d="M146 254 L225 303 L249 330 L171 302 Z" fill="#6F4BC7"/>

    <!-- The wider body and short tail keep the optical center calm. -->
    <path d="M258 298 L333 264 L369 316 L307 344 Z" fill="#8B68E4"/>
    <path d="M258 298 L307 344 L271 381 L228 335 Z" fill="#9C7BF6"/>
    <path d="M307 344 L369 316 L341 366 L271 381 Z" fill="#6F4BC7"/>
    <path d="M239 347 L166 391 L244 380 L272 361 Z" fill="#9C7BF6"/>

    <!-- The signature neck tapers in deliberate steps into one compact head. -->
    <path d="M336 322 L354 270 L374 218 L397 176 L418 157 L432 166 L413 185 L392 226 L376 279 L360 337 Z" fill="#6F4BC7"/>
    <path d="M359 310 L371 271 L389 222 L406 184 L420 168 L428 174 L414 190 L399 229 L383 280 L369 326 Z" fill="#9C7BF6"/>
    <path d="M418 157 L445 158 L433 167 L420 169 Z" fill="#B39AFB"/>
  </g>
</svg>
