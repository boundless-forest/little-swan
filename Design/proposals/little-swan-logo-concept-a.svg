<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Little Swan logo refinement concept A</title>
  <desc id="desc">A precision-origami app icon and a dedicated monochrome menu bar optical master.</desc>

  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFAFD"/>
      <stop offset="1" stop-color="#F4F1F8"/>
    </linearGradient>
    <linearGradient id="tile" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F7F3FE"/>
      <stop offset="1" stop-color="#EDE6FA"/>
    </linearGradient>
    <filter id="tileShadow" x="-25%" y="-25%" width="150%" height="165%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#342E3D" flood-opacity="0.14"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6F4BC7" flood-opacity="0.08"/>
    </filter>
    <filter id="markShadow" x="-25%" y="-25%" width="150%" height="165%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#4C299E" flood-opacity="0.18"/>
    </filter>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="14" flood-color="#211D29" flood-opacity="0.06"/>
    </filter>

    <symbol id="swanMark" viewBox="0 0 512 512">
      <g filter="url(#markShadow)" stroke-linejoin="round">
        <!-- Two large wing planes replace the noisy screenshot-derived fragments. -->
        <path d="M252 304 L209 112 L300 193 L335 292 Z" fill="#B39AFB"/>
        <path d="M247 306 L88 166 L166 278 L228 319 Z" fill="#9C7BF6"/>
        <path d="M228 319 L124 226 L170 316 L258 357 Z" fill="#6F4BC7"/>

        <!-- Compact body and tail keep the visual weight near the optical center. -->
        <path d="M248 304 L335 261 L365 323 L275 367 L228 331 Z" fill="#8B68E4"/>
        <path d="M275 367 L365 323 L329 370 L242 395 Z" fill="#6F4BC7"/>
        <path d="M243 347 L151 407 L238 395 L286 366 Z" fill="#9C7BF6"/>

        <!-- The long upturned neck is the signature Little Swan anchor. -->
        <path d="M334 289 L360 229 L389 170 L419 145 L435 157 L407 181 L382 244 L362 329 Z" fill="#6F4BC7"/>
        <path d="M360 279 L380 230 L405 178 L420 159 L430 165 L412 184 L392 241 L371 311 Z" fill="#9C7BF6"/>
        <path d="M418 145 L450 147 L437 157 L421 160 Z" fill="#B39AFB"/>
      </g>
    </symbol>

    <symbol id="appIcon" viewBox="0 0 512 512">
      <rect x="54" y="54" width="404" height="404" rx="92" fill="url(#tile)" stroke="#DED5EF" stroke-width="2" filter="url(#tileShadow)"/>
      <path d="M91 150 C127 86 204 66 277 72" fill="none" stroke="#FFFFFF" stroke-opacity="0.74" stroke-width="4" stroke-linecap="round"/>
      <use href="#swanMark" x="50" y="55" width="414" height="414"/>
    </symbol>

    <symbol id="menuMark" viewBox="0 0 120 96">
      <!-- Separate 18 pt optical master: one mass, thicker neck, larger head. -->
      <path d="M8 26 L47 44 L38 8 L62 37 L72 54 L83 38 L91 17 L103 9 L114 13 L104 20 L98 39 L90 64 L76 73 L54 80 L36 70 L21 63 L29 53 Z" fill="currentColor"/>
    </symbol>
  </defs>

  <rect width="1440" height="900" fill="url(#canvas)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
    <text x="48" y="49" fill="#211D29" font-size="27" font-weight="700" letter-spacing="-0.3">Little Swan · Logo refinement</text>
    <text x="48" y="76" fill="#777080" font-size="14" font-weight="500">CONCEPT A — PRECISION ORIGAMI</text>

    <!-- App icon panel -->
    <rect x="40" y="102" width="820" height="752" rx="32" fill="#FFFFFF" filter="url(#panelShadow)"/>
    <text x="80" y="151" fill="#625C6C" font-size="13" font-weight="700" letter-spacing="1.6">APP ICON</text>
    <text x="80" y="181" fill="#211D29" font-size="22" font-weight="700">Quiet surface, crisp folds</text>

    <use href="#appIcon" x="104" y="191" width="456" height="456"/>

    <g transform="translate(596 225)">
      <text x="0" y="0" fill="#777080" font-size="12" font-weight="700" letter-spacing="1.2">PALETTE</text>
      <circle cx="16" cy="42" r="16" fill="#B39AFB"/>
      <circle cx="16" cy="87" r="16" fill="#9C7BF6"/>
      <circle cx="16" cy="132" r="16" fill="#6F4BC7"/>
      <text x="45" y="47" fill="#625C6C" font-size="13">highlight</text>
      <text x="45" y="92" fill="#625C6C" font-size="13">brand</text>
      <text x="45" y="137" fill="#625C6C" font-size="13">fold depth</text>

      <text x="0" y="198" fill="#777080" font-size="12" font-weight="700" letter-spacing="1.2">STRUCTURE</text>
      <text x="0" y="228" fill="#625C6C" font-size="13">• 7 intentional planes</text>
      <text x="0" y="254" fill="#625C6C" font-size="13">• no white seams</text>
      <text x="0" y="280" fill="#625C6C" font-size="13">• 78% visual fill</text>
      <text x="0" y="306" fill="#625C6C" font-size="13">• optical centering</text>
    </g>

    <line x1="80" y1="670" x2="820" y2="670" stroke="#EAE6EF"/>
    <text x="80" y="713" fill="#777080" font-size="12" font-weight="700" letter-spacing="1.2">SIZE CHECK</text>

    <use href="#appIcon" x="194" y="699" width="116" height="116"/>
    <use href="#appIcon" x="378" y="725" width="64" height="64"/>
    <use href="#appIcon" x="510" y="741" width="32" height="32"/>
    <text x="225" y="833" fill="#777080" font-size="12">128</text>
    <text x="399" y="809" fill="#777080" font-size="12">64</text>
    <text x="518" y="793" fill="#777080" font-size="12">32</text>

    <!-- Menu bar panel -->
    <rect x="892" y="102" width="508" height="752" rx="32" fill="#FFFFFF" filter="url(#panelShadow)"/>
    <text x="932" y="151" fill="#625C6C" font-size="13" font-weight="700" letter-spacing="1.6">MENU BAR</text>
    <text x="932" y="181" fill="#211D29" font-size="22" font-weight="700">A separate 18 pt optical master</text>

    <rect x="932" y="216" width="428" height="78" rx="16" fill="#F7F7F7" stroke="#EAE6EF"/>
    <circle cx="968" cy="255" r="3" fill="#C7C2CC"/>
    <circle cx="982" cy="255" r="3" fill="#C7C2CC"/>
    <circle cx="996" cy="255" r="3" fill="#C7C2CC"/>
    <g color="#17141D">
      <use href="#menuMark" x="1239" y="245" width="18" height="18"/>
    </g>

    <rect x="932" y="314" width="428" height="78" rx="16" fill="#17141D"/>
    <circle cx="968" cy="353" r="3" fill="#665F70"/>
    <circle cx="982" cy="353" r="3" fill="#665F70"/>
    <circle cx="996" cy="353" r="3" fill="#665F70"/>
    <g color="#FFFFFF">
      <use href="#menuMark" x="1239" y="343" width="18" height="18"/>
    </g>

    <rect x="932" y="430" width="428" height="238" rx="24" fill="#F7F6FA"/>
    <g color="#211D29">
      <use href="#menuMark" x="1038" y="465" width="216" height="172"/>
    </g>

    <line x1="932" y1="702" x2="1360" y2="702" stroke="#EAE6EF"/>
    <text x="932" y="742" fill="#777080" font-size="12" font-weight="700" letter-spacing="1.2">SHARED VISUAL DNA</text>
    <g fill="#625C6C" font-size="13">
      <text x="932" y="778">40° rising neck</text>
      <text x="1074" y="778">V-shaped wings</text>
      <text x="1216" y="778">short folded tail</text>
    </g>
    <g fill="#9C7BF6">
      <circle cx="944" cy="809" r="5"/>
      <circle cx="1086" cy="809" r="5"/>
      <circle cx="1228" cy="809" r="5"/>
    </g>
  </g>
</svg>
